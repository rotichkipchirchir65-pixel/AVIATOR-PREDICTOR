<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium radial red glow inside the black icon -->
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow for the flight lines and fuselage -->
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base: Sleek rounded dark square standard for PWA/APK launcher icon -->
  <rect width="512" height="512" fill="#000000" />
  <circle cx="256" cy="256" r="230" fill="url(#redGlow)" />

  <!-- Glowing airplane graphic -->
  <g transform="translate(106, 136) scale(2.5)" filter="url(#glowEffect)">
    <!-- Propeller spinner line -->
    <path
      d="M100 12 L106 32"
      stroke="#ef4444"
      stroke-width="2.5"
      stroke-linecap="round"
    />
    <path
      d="M106 12 L100 32"
      stroke="#ef4444"
      stroke-width="2.5"
      stroke-linecap="round"
    />

    <!-- Plane fuselage & wings -->
    <path
      d="M20 40 
         C24 38, 30 36, 40 33
         L75 22 
         C82 20, 92 18, 98 20
         C102 21, 104 23, 103 25
         C101 27, 95 29, 88 34
         L55 46
         C48 48, 40 48, 34 47
         Z"
      fill="#ef4444"
    />

    <!-- Propeller cap nose -->
    <path
      d="M98 19 
         C101 19, 104 22, 104 24
         C104 26, 101 29, 98 29
         Z"
      fill="#991b1b"
    />

    <!-- Back tail horizontal structure -->
    <path
      d="M25 38 
         L16 42
         C13 43, 12 41, 14 39
         L22 34
         Z"
      fill="#dc2626"
    />

    <!-- Back tail vertical stabilizer -->
    <path
      d="M29 35 
         L21 16
         C20 14, 23 13, 25 15
         L34 30
         Z"
      fill="#ef4444"
    />

    <!-- Tilted bottom wings wingtips -->
    <path
      d="M58 35 
         L50 56
         C49 58, 45 56, 46 53
         L56 32
         Z"
      fill="#b91c1c"
    />

    <!-- Cockpit Canopy glass -->
    <path
      d="M72 23 
         C74 19, 81 18, 85 20
         L83 23
         Z"
      fill="#ffffff"
      opacity="0.85"
    />

    <!-- Stream wind lines behind the flight trail -->
    <path
      d="M5 32 L15 32"
      stroke="#ef4444"
      stroke-width="1.5"
      opacity="0.6"
      stroke-dasharray="4 2"
    />
    <path
      d="M8 24 L18 24"
      stroke="#ef4444"
      stroke-width="1.5"
      opacity="0.8"
      stroke-dasharray="6 3"
    />
    <path
      d="M3 41 L12 41"
      stroke="#ef4444"
      stroke-width="1.2"
      opacity="0.5"
      stroke-dasharray="3 3"
    />
  </g>
</svg>
